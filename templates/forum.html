<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Forum Astronomie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4 mb-4">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">⬅ Retour Accueil</a>
    </div>

    <div class="container">
        <h2>Forum de discussion 🗣️</h2>

        <div class="card p-3 mb-4 shadow-sm bg-white">
            <form method="POST" action="/forum" class="d-flex gap-2">
                <input type="text" name="titre" class="form-control" placeholder="Posez une question ou lancez un sujet..." required>
                <button type="submit" class="btn btn-success">Publier</button>
            </form>
        </div>

        <div class="list-group shadow-sm">
            {% for s in sujets %}
            <a href="{{ url_for('sujet_detail', id=s.id) }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1 text-primary">{{ s.titre }}</h5>
                    <small class="text-muted">Par <strong>{{ s.auteur }}</strong> le {{ s.date_creation.strftime('%d/%m/%Y') }}</small>
                </div>
                <span class="badge bg-primary rounded-pill">Voir la discussion</span>
            </a>
            {% else %}
            <div class="list-group-item text-center text-muted">Aucun sujet pour le moment. Soyez le premier !</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
