<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Photographies d'Astronomie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 250px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .card:hover .card-img-top {
            transform: scale(1.05);
        }
        .overflow-hidden {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🔭 Web Astronomie</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('appareils') }}">Appareils Photo</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('telescopes') }}">Téléscopes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{{ url_for('photographies') }}">Photographies</a></li>
                </ul>
                <div class="d-flex text-light align-items-center">
                    <a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm me-3">Retour Accueil</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Galerie Photographique communautaire</h2>
        
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for photo in photographies %}
            <div class="col">
                <div class="card h-100 shadow-sm overflow-hidden">
                    <img src="{{ photo.url_image }}" class="card-img-top" alt="{{ photo.titre }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ photo.titre }}</h5>
                        <p class="card-text text-muted">{{ photo.description }}</p>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12 text-center">
                <p class="text-muted">Aucune photographie n'a été publiée pour le moment.</p>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
